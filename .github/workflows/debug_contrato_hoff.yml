name: Debug Contrato HOFF

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug phantoms contas_receber via API CA
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CA_CLIENT_ID: ${{ secrets.CA_CLIENT_ID }}
          CA_CLIENT_SECRET: ${{ secrets.CA_CLIENT_SECRET }}
          CA_REFRESH_TOKEN: ${{ secrets.CA_REFRESH_TOKEN }}
        run: |
          python3 -c "
          import os, sys, json
          sys.path.insert(0, '.')
          from etl.auth import get_access_token
          from etl.client import ContaAzulClient
          from etl.db import get_connection

          token = get_access_token()
          client = ContaAzulClient(token)

          # Busca alguns phantoms do banco para testar na API
          with get_connection() as conn:
              with conn.cursor() as cur:
                  cur.execute('''
                      SELECT cr.id, p.nome, cr.data_vencimento, cr.total, cr.status
                      FROM ca.contas_receber cr
                      JOIN ca.pessoas p ON p.id = cr.pessoa_id
                      JOIN ca.contratos c ON c.cliente_id = p.id
                      WHERE cr.id_venda IS NULL
                        AND cr.data_atualizacao IS NULL
                        AND cr.status NOT ILIKE 'Cancelado'
                        AND c.status = 'INATIVO'
                        AND cr.data_vencimento >= CURRENT_DATE
                      LIMIT 5
                  ''')
                  phantoms = cur.fetchall()

          print('Phantoms no banco:', len(phantoms))
          print()

          for cr_id, nome, venc, total, status_db in phantoms:
              print('=' * 60)
              print(f'Cliente: {nome}')
              print(f'Vencimento: {venc} | Valor: {total} | Status DB: {status_db}')
              print(f'ID: {cr_id}')
              try:
                  data = client.get(f'/financeiro/eventos-financeiros/{cr_id}')
                  print(f'API retornou: status={data.get(\"status\")} | valor_aberto={data.get(\"valor_aberto\")}')
                  print(f'Campos: {sorted(data.keys())}')
              except Exception as e:
                  print(f'ERRO na API: {e}')
              print()
          "
