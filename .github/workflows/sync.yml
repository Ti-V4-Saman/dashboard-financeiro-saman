name: Sync ContaAzul Data

on:
  schedule:
    - cron: '*/15 * * * *'  # Executa a cada 15 minutos
  workflow_dispatch:        # Permite rodar manualmente pelo botão no GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ETL Sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CA_CLIENT_ID: ${{ secrets.CA_CLIENT_ID }}
          CA_CLIENT_SECRET: ${{ secrets.CA_CLIENT_SECRET }}
          CA_REFRESH_TOKEN: ${{ secrets.CA_REFRESH_TOKEN }}
        run: python -m etl.main
