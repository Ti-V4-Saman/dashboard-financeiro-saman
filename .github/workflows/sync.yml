name: Sync ContaAzul Data

on:
  schedule:
    - cron: '0 * * * *'   # De hora em hora (ETL dura ~44min)
  workflow_dispatch:       # Permite rodar manualmente pelo botão no GitHub
    inputs:
      sync_mode:
        description: 'Modo de sincronização (incremental ou full)'
        required: false
        default: 'incremental'
        type: choice
        options:
          - incremental
          - full

# Impede execuções paralelas: se uma já está rodando, a próxima espera.
# Elimina a disputa pelo refresh token rotativo do Conta Azul.
concurrency:
  group: etl-contaazul
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 240    # Aumentado de 60 para 240: durante a fase de
                            # transição (CRs com data_atualizacao NULL sendo
                            # re-sincronizadas em lotes pelo fallback), runs
                            # podem ser bem mais longos que os ~44min normais.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ETL Sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CA_CLIENT_ID: ${{ secrets.CA_CLIENT_ID }}
          CA_CLIENT_SECRET: ${{ secrets.CA_CLIENT_SECRET }}
          CA_REFRESH_TOKEN: ${{ secrets.CA_REFRESH_TOKEN }}
          SYNC_MODE: ${{ inputs.sync_mode || 'incremental' }}
        run: python -m etl.main
